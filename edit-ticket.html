<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Ticket - IT Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/src/style.css">
    <script>
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-bs-theme', 'dark');
      }
    </script>
  </head>
  <body class="bg-body-secondary">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html" data-i18n="brand">IT Help Desk</a>
        <div class="collapse navbar-collapse justify-content-end" id="nav">
          <ul class="navbar-nav align-items-center">
            <li class="nav-item">
              <a class="nav-link text-white" href="dashboard.html" data-i18n="backBtn">← Back to Dashboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow">
            <div class="card-header bg-warning text-dark">
              <h4 class="mb-0" data-i18n="editTitle">Edit Support Ticket</h4>
            </div>
            <div class="card-body">
              <div id="alertContainer"></div>

              <form id="editTicketForm" style="display: none;">
                <div class="mb-3">
                  <label for="title" class="form-label"><span data-i18n="labelTitle">Title</span> <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="title" required>
                </div>

                <div class="mb-3">
                  <label for="category" class="form-label"><span data-i18n="labelCategory">Category</span> <span class="text-danger">*</span></label>
                  <select class="form-select" id="category" required></select>
                </div>

                <div class="mb-3">
                  <label for="priority" class="form-label"><span data-i18n="labelPriority">Priority</span> <span class="text-danger">*</span></label>
                  <select class="form-select" id="priority" required>
                    <option value="low" data-i18n="low">Low</option>
                    <option value="medium" data-i18n="medium">Medium</option>
                    <option value="high" data-i18n="high">High</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label for="description" class="form-label"><span data-i18n="labelDesc">Description</span> <span class="text-danger">*</span></label>
                  <textarea class="form-control" id="description" rows="5" required></textarea>
                </div>

                <div class="d-grid gap-2 mt-4">
                  <button type="submit" class="btn btn-warning fw-bold" id="submitBtn" data-i18n="updateBtn">Update Ticket</button>
                  <a href="dashboard.html" class="btn btn-outline-secondary" data-i18n="cancelBtn">Cancel</a>
                </div>
              </form>
              
              <div id="loadingMessage" class="text-center my-4">
                  <div class="spinner-border text-primary" role="status"></div>
                  <p class="mt-2" data-i18n="loadingData">Loading ticket data...</p>
              </div>

            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module">
      import { supabase } from './src/supabase.js'

      const dictionary = {
        en: {
          brand: "IT Help Desk", backBtn: "← Back to Dashboard", editTitle: "Edit Support Ticket",
          labelTitle: "Title", labelCategory: "Category", labelPriority: "Priority",
          low: "Low", medium: "Medium", high: "High", labelDesc: "Description",
          updateBtn: "Update Ticket", cancelBtn: "Cancel", loadingData: "Loading ticket data...", updating: "Updating..."
        },
        bg: {
          brand: "IT Help Desk", backBtn: "← Обратно", editTitle: "Редакция на Тикет",
          labelTitle: "Заглавие", labelCategory: "Категория", labelPriority: "Приоритет",
          low: "Нисък", medium: "Среден", high: "Висок", labelDesc: "Описание",
          updateBtn: "Запази Промените", cancelBtn: "Отказ", loadingData: "Зареждане на данни...", updating: "Запазване..."
        }
      };

      let currentLang = localStorage.getItem('lang') || 'en';
      let currentUser = null;
      let currentTicketId = new URLSearchParams(window.location.search).get('id');

      function applyTranslations() {
        const texts = dictionary[currentLang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
          if (texts[el.getAttribute('data-i18n')]) el.textContent = texts[el.getAttribute('data-i18n')];
        });
      }

      applyTranslations();

      async function checkAuth() {
        const { data: { session } } = await supabase.auth.getSession()
        if (!session) window.location.href = 'login.html'
        return session.user;
      }

      async function loadCategories() {
        const { data } = await supabase.from('categories').select('*').order('name');
        const select = document.getElementById('category');
        if (data) {
          data.forEach(c => select.innerHTML += `<option value="${c.id}">${c.name}</option>`);
        }
      }

      async function loadTicketData() {
        if (!currentTicketId) {
            window.location.href = 'dashboard.html';
            return;
        }

        const { data, error } = await supabase.from('tickets').select('*').eq('id', currentTicketId).single();
        
        if (error || !data) {
            alert('Ticket not found!');
            window.location.href = 'dashboard.html';
            return;
        }

        // Защита: Ако тикетът не е "open" или потребителят не е авторът -> връщаме го обратно
        if (data.status !== 'open' || data.user_id !== currentUser.id) {
            alert('You cannot edit this ticket.');
            window.location.href = 'dashboard.html';
            return;
        }

        // Попълваме формата с данните
        document.getElementById('title').value = data.title;
        document.getElementById('category').value = data.category_id;
        document.getElementById('priority').value = (data.priority || 'low').toLowerCase();
        document.getElementById('description').value = data.description;

        // Показваме формата
        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('editTicketForm').style.display = 'block';
      }

      document.getElementById('editTicketForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; 
        btn.textContent = dictionary[currentLang].updating;

        try {
          const { error } = await supabase.from('tickets').update({
            category_id: document.getElementById('category').value,
            title: document.getElementById('title').value, 
            description: document.getElementById('description').value,
            priority: document.getElementById('priority').value
          }).eq('id', currentTicketId);

          if (error) throw error;
          
          // Връщаме го към прегледа на тикета
          window.location.href = `view-ticket.html?id=${currentTicketId}`;
        } catch (err) {
          alert('Error updating ticket: ' + err.message); 
          btn.disabled = false; 
          btn.textContent = dictionary[currentLang].updateBtn;
        }
      });

      ;(async () => {
        currentUser = await checkAuth();
        if (currentUser) {
            await loadCategories();
            await loadTicketData();
        }
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
