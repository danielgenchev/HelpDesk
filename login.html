<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Login - IT Help Desk</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/src/style.css">
        <script>
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
            }
        </script>
    </head>
    <body class="bg-body-secondary">
        <div class="container min-vh-100 d-flex align-items-center justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold">IT Help Desk</h2>
                    <p class="text-muted">Sign in to continue</p>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <div id="alertContainer"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email address (or username)</label>
                                <input type="text" class="form-control" id="email" name="email" required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>

                            <div class="d-grid gap-2 mb-3">
                                <button id="submitBtn" class="btn btn-primary" type="submit">Sign In</button>
                            </div>
                        </form>

                        <div class="position-relative mt-4 mb-3 text-center">
                            <hr>
                            <span class="position-absolute top-50 start-50 translate-middle px-2 bg-body text-muted small">FOR EXAMINERS</span>
                        </div>
                        <div class="d-grid">
                            <button id="demoLoginBtn" class="btn btn-outline-dark">
                                🚀 1-Click Demo Admin Login
                            </button>
                        </div>

                        <p class="mt-4 text-center small">Don't have an account? <a href="register.html">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>

        <script type="module">
            import { supabase } from './src/supabase.js'

            const form = document.getElementById('loginForm')
            const alertContainer = document.getElementById('alertContainer')
            const submitBtn = document.getElementById('submitBtn')
            const demoLoginBtn = document.getElementById('demoLoginBtn')
            const emailInput = document.getElementById('email')
            const passwordInput = document.getElementById('password')

            // Автоматично пренасочване, ако вече е логнат
            supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) window.location.href = 'dashboard.html'
            })

            function showAlert(message, type = 'danger') {
                alertContainer.innerHTML = `
                    <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                        ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                `
            }

            // Основна функция за вход
            async function handleLogin(email, password) {
                alertContainer.innerHTML = ''
                submitBtn.disabled = true
                demoLoginBtn.disabled = true
                submitBtn.textContent = 'Signing in...'

                // ХАК: Ако потребителят въведе само "demo", го правим на "demo@helpdesk.local"
                let finalEmail = email.trim()
                if (finalEmail.toLowerCase() === 'demo') {
                    finalEmail = 'demo@helpdesk.local'
                }

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: finalEmail,
                        password: password,
                    })

                    if (error) {
                        showAlert(error.message || 'Invalid login credentials.')
                        submitBtn.disabled = false
                        demoLoginBtn.disabled = false
                        submitBtn.textContent = 'Sign In'
                        return
                    }

                    // Успешен вход -> отиваме в таблото
                    window.location.href = 'dashboard.html'
                } catch (err) {
                    showAlert('An unexpected error occurred.')
                    submitBtn.disabled = false
                    demoLoginBtn.disabled = false
                    submitBtn.textContent = 'Sign In'
                }
            }

            // Слушаме за стандартно изпращане на формата
            form.addEventListener('submit', (e) => {
                e.preventDefault()
                handleLogin(emailInput.value, passwordInput.value)
            })

            // Слушаме за клик върху 1-Click Demo бутона
            demoLoginBtn.addEventListener('click', (e) => {
                e.preventDefault()
                emailInput.value = 'demo'
                passwordInput.value = 'demo123'
                handleLogin('demo', 'demo123')
            })
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
