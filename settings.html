<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings - IT Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <script>
      // Apply dark theme immediately to prevent white flash
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-bs-theme', 'dark');
      }
    </script>
  </head>
  <body class="bg-body-secondary">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">IT Help Desk</a>
        <div class="collapse navbar-collapse justify-content-end">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link text-white" href="dashboard.html">← Back to Dashboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-5" style="max-width: 600px;">
      <h2 class="mb-4">Settings</h2>
      <div id="alertContainer"></div>

      <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">Appearance</div>
        <div class="card-body">
          <div class="form-check form-switch fs-5">
            <input class="form-check-input" type="checkbox" id="darkModeSwitch">
            <label class="form-check-label" for="darkModeSwitch">Dark Mode</label>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">Security</div>
        <div class="card-body">
          <form id="passwordForm">
            <div class="mb-3">
              <label for="newPassword" class="form-label">New Password *</label>
              <input type="password" class="form-control" id="newPassword" required minlength="6">
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirm Password *</label>
              <input type="password" class="form-control" id="confirmPassword" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" id="updateBtn">Update Password</button>
          </form>
        </div>
      </div>
    </main>

    <script type="module" src="/src/settings.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
